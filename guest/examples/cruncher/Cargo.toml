[package]
name = "eo9-example-cruncher"
description = "Eo9 example program: pure compute with no imports at all — a closed program for sandbox/only and determinism demos (targets the eo9-examples:cruncher/cruncher world)."
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
# A core wasm module that `cargo xtask build-guest` turns into a component.
crate-type = ["cdylib"]

[dependencies]
eo9-guest = { workspace = true }
wit-bindgen = { workspace = true }
