[package]
name = "eo9-example-sockcheck"
description = "Eo9 example program: round-trips a payload over TCP (listen/connect/accept/send/recv) and UDP against whatever eo9:net/l4 provider it is composed with (targets the eo9-examples:sockcheck/sockcheck world)."
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
# A core wasm module that `cargo xtask build-guest` turns into a component.
crate-type = ["cdylib"]

[dependencies]
eo9-guest = { workspace = true }
wit-bindgen = { workspace = true }
