[package]
name = "eo9-example-l2check"
description = "Eo9 example program: prove a link-layer (eo9:net/l2) provider moves real frames by ARP-resolving the QEMU user-net gateway — list the interface, send a broadcast ARP request, and wait for the reply (targets the eo9-examples:l2check/l2check world: net l2 + io + text)."
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
# A core wasm module that `cargo xtask build-guest` turns into a component.
crate-type = ["cdylib"]

[dependencies]
eo9-guest = { workspace = true }
wit-bindgen = { workspace = true }
