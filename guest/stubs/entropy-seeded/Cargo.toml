[package]
name = "eo9-stub-entropy-seeded"
description = "Eo9 standard stub provider `entropy.seeded`: exports eo9:entropy/entropy backed by a deterministic PRNG seeded through configure (reproducible tests)."
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
# A core wasm module that `cargo xtask build-guest` turns into a component.
crate-type = ["cdylib"]

[dependencies]
eo9-guest = { workspace = true }
wit-bindgen = { workspace = true }
