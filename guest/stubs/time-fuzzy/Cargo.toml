[package]
name = "eo9-stub-time-fuzzy"
description = "Eo9 standard stub provider `time.fuzzy`: imports eo9:time/time and re-exports it with resolution degraded to the granularity bound by configure (side-channel mitigation)."
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
# A core wasm module that `cargo xtask build-guest` turns into a component.
crate-type = ["cdylib"]

[dependencies]
eo9-guest = { workspace = true }
wit-bindgen = { workspace = true }
