[package]
name = "eo9-stub-perf-none"
description = "Eo9 standard stub provider `perf.none`: exports eo9:perf/perf-optional with default() answering none (absence of the perf capability)."
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
# A core wasm module that `cargo xtask build-guest` turns into a component.
crate-type = ["cdylib"]

[dependencies]
eo9-guest = { workspace = true }
wit-bindgen = { workspace = true }
