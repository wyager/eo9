# The blob itself: a cdylib for `wasm32-unknown-unknown` that embeds wasmtime (custom
# platform layer, Pulley interpreter, fiberless component-model-async) plus pre-AOT'd
# pulley32 artifacts of real Eo9 components, and exposes a handful of plain exports the
# page's JS calls. Its only import is `env.host_write` (terminal output).
[package]
name = "web-eo9-blob"
version.workspace = true
edition.workspace = true
publish.workspace = true

[lib]
crate-type = ["cdylib"]

[features]
# In-blob codegen (plan/18: the fully self-hosted browser VM): link the same vendored
# no_std Cranelift + wasmtime compile layers the bare-metal kernel uses for on-target
# codegen, with cranelift's Pulley backend as the emission target — so a fused composition
# is compiled *inside the blob*, client-side, with no server involvement. On by default for
# the shipped blob; turn off to measure the runtime-only blob size.
default = ["inblob-codegen"]
inblob-codegen = ["wasmtime/cranelift"]

[dependencies]
# Declared directly (not via workspace inheritance) because this crate needs
# `default-features = false`: wasmtime's `std` feature does not build for wasm32 (its std
# platform layer assumes mmap), so the blob uses the custom platform layer exactly like the
# bare-metal kernel, plus the vendored fiberless opt-in so callback-ABI guest calls run
# without a worker fiber (wasm32 has no fiber backend).
wasmtime = { version = "45.0.0", default-features = false, features = [
    "runtime",
    "component-model",
    "pulley",
    "async",
    "component-model-async",
    "component-model-async-fiberless",
] }
# The component algebra (the `eo9:exec` surface eosh imports). `default-features = false`
# = the no_std build, exactly as the bare-metal kernel links it; its closure is patched to
# the vendored no_std crates in the workspace `[patch.crates-io]` (see the workspace manifest).
eo9-component = { path = "../../../crates/eo9-component", default-features = false }
