[package]
name = "eo9-stub-disk-mem"
description = "Eo9 standard stub provider `disk.mem`: exports eo9:disk/disk backed by a RAM block device of the size bound by configure."
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
# A core wasm module that `cargo xtask build-guest` turns into a component.
crate-type = ["cdylib"]

[dependencies]
eo9-guest = { workspace = true }
wit-bindgen = { workspace = true }
