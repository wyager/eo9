[package]
name = "eo9-stub-fs-readonly"
description = "Eo9 standard stub provider `fs.readonly`: imports eo9:fs/fs and re-exports it read-only; writes, creates, and removes fail with read-only."
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
# A core wasm module that `cargo xtask build-guest` turns into a component.
crate-type = ["cdylib"]

[dependencies]
eo9-guest = { workspace = true }
wit-bindgen = { workspace = true }
