[package]
name = "eo9-stub-net-l4-loopback"
description = "Eo9 standard stub provider `net.l4.loopback`: a self-contained in-memory transport layer — TCP and UDP between sockets created through this instance, loopback addresses only."
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
# A core wasm module that `cargo xtask build-guest` turns into a component.
crate-type = ["cdylib"]

[dependencies]
eo9-guest = { workspace = true }
wit-bindgen = { workspace = true }
