[package]
edition = "2024"
rust-version = "1.93.0"
name = "wasmtime-internal-cranelift"
version = "45.0.0"
authors = ["The Wasmtime Project Developers"]
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "INTERNAL: Integration between Cranelift and Wasmtime"
documentation = "https://docs.rs/wasmtime-cranelift/"
readme = false
keywords = [
    "webassembly",
    "wasm",
]
categories = ["wasm"]
license = "Apache-2.0 WITH LLVM-exception"
repository = "https://github.com/bytecodealliance/wasmtime"
resolver = "2"

[features]
all-arch = ["cranelift-codegen/all-arch"]
component-model = ["wasmtime-environ/component-model"]
gc = ["wasmtime-environ/gc"]
gc-copying = [
    "gc",
    "wasmtime-environ/gc-copying",
]
gc-drc = [
    "gc",
    "wasmtime-environ/gc-drc",
]
gc-null = [
    "gc",
    "wasmtime-environ/gc-null",
]
host-arch = ["cranelift-codegen/host-arch"]
incremental-cache = ["cranelift-codegen/incremental-cache"]
pulley = [
    "cranelift-codegen/pulley",
    "dep:pulley-interpreter",
]
stack-switching = []
threads = ["wasmtime-environ/threads"]
trace-log = ["cranelift-codegen/trace-log"]
wmemcheck = ["wasmtime-environ/wmemcheck"]

[lib]
name = "wasmtime_internal_cranelift"
path = "src/lib.rs"

[dependencies.cfg-if]
version = "1.0"

# no_std (plan/12 D26-28): drop `std` and `timing` (std::time::Instant), keep the codegen
# core + unwind + the aarch64 (host) backend. `pulley` is added by this crate's own `pulley`
# feature when enabled.
[dependencies.cranelift-codegen]
version = "0.132.0"
features = [
    "core",
    "unwind",
    "host-arch",
]
default-features = false

[dependencies.cranelift-control]
version = "0.132.0"
default-features = false

[dependencies.cranelift-entity]
version = "0.132.0"

[dependencies.cranelift-frontend]
version = "0.132.0"
features = ["core"]
default-features = false

# no_std: cranelift-native does host-CPU feature detection and is std-only. It is only used
# to infer flags when NO target triple is specified; the kernel always specifies its target,
# so we make it optional (off in the kernel build) and gate the call (src/isa_builder.rs).
[dependencies.cranelift-native]
version = "0.132.0"
optional = true

[dependencies.gimli]
version = "0.33.0"
features = [
    "read",
]
default-features = false

[dependencies.itertools]
version = "0.14.0"
features = ["use_alloc"]
default-features = false

[dependencies.log]
version = "0.4.28"
default-features = false

[dependencies.object]
version = "0.39.0"
features = [
    "read_core",
    "elf",
    "write_core",
]
default-features = false

[dependencies.pulley-interpreter]
version = "=45.0.0"
optional = true

[dependencies.smallvec]
version = "1.15.1"
features = ["union"]

[dependencies.target-lexicon]
version = "0.13.3"

# no_std (plan/12 D28): thiserror's `std` default does `extern crate std`; take it without
# defaults (it is no_std-clean) so this edge doesn't unify std onto the codegen graph.
[dependencies.thiserror]
version = "2.0.17"
default-features = false

[dependencies.wasmparser]
version = "0.248.0"
features = ["simd"]
default-features = false

[dependencies.wasmtime-core]
version = "=45.0.0"
package = "wasmtime-internal-core"

[dependencies.wasmtime-environ]
version = "=45.0.0"
features = ["compile"]

[dependencies.wasmtime-unwinder]
version = "=45.0.0"
features = ["cranelift"]
package = "wasmtime-internal-unwinder"

[dependencies.wasmtime-versioned-export-macros]
version = "=45.0.0"
package = "wasmtime-internal-versioned-export-macros"

[lints.clippy]
allow_attributes_without_reason = "warn"
clone_on_copy = "warn"
extra_unused_type_parameters = "warn"
from_over_into = "warn"
manual_strip = "warn"
map_clone = "warn"
multiple_bound_locations = "warn"
redundant_field_names = "warn"
uninlined_format_args = "warn"
unnecessary_cast = "warn"
unnecessary_fallible_conversions = "warn"
unnecessary_mut_passed = "warn"
unnecessary_to_owned = "warn"
useless_conversion = "warn"

[lints.clippy.all]
level = "allow"
priority = -1

[lints.rust]
trivial_numeric_casts = "warn"
unstable_features = "warn"
unused-lifetimes = "warn"
unused-macro-rules = "warn"
unused_extern_crates = "warn"
unused_import_braces = "warn"

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = [
    "cfg(pulley_tail_calls)",
    "cfg(pulley_assume_llvm_makes_tail_calls)",
    "cfg(pulley_disable_interp_simd)",
    "cfg(arc_try_new)",
    "cfg(fuzzing)",
    "cfg(gc_zeal)",
]
