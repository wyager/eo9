[package]
name = "eo9-stub-fs-none"
description = "Eo9 standard stub provider `fs.none`: exports eo9:fs/fs-optional with default() answering none (absence of the filesystem capability)."
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
# A core wasm module that `cargo xtask build-guest` turns into a component.
crate-type = ["cdylib"]

[dependencies]
eo9-guest = { workspace = true }
wit-bindgen = { workspace = true }
