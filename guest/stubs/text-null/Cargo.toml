[package]
name = "eo9-stub-text-null"
description = "Eo9 standard stub provider `text.null`: exports eo9:text/text discarding all output; stdin is permanently at end of input."
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
# A core wasm module that `cargo xtask build-guest` turns into a component.
crate-type = ["cdylib"]

[dependencies]
eo9-guest = { workspace = true }
wit-bindgen = { workspace = true }
