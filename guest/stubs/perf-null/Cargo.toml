[package]
name = "eo9-stub-perf-null"
description = "Eo9 standard stub provider `perf.null`: exports eo9:perf/perf accepting and discarding everything; counters read as zero."
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
# A core wasm module that `cargo xtask build-guest` turns into a component.
crate-type = ["cdylib"]

[dependencies]
eo9-guest = { workspace = true }
wit-bindgen = { workspace = true }
