[package]
name = "eo9-stub-pci-filtered"
description = "Eo9 standard stub provider `pci.filtered`: attenuates an underlying eo9:pci capability to a configured allow-list of device addresses; everything else answers denied."
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
# A core wasm module that `cargo xtask build-guest` turns into a component.
crate-type = ["cdylib"]

[dependencies]
eo9-guest = { workspace = true }
wit-bindgen = { workspace = true }
