[package]
name = "eo9-stub-net-l4-none"
description = "Eo9 standard stub provider `net.l4.none`: exports eo9:net/l4-optional with default() answering none (absence of the transport-layer network capability)."
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
# A core wasm module that `cargo xtask build-guest` turns into a component.
crate-type = ["cdylib"]

[dependencies]
eo9-guest = { workspace = true }
wit-bindgen = { workspace = true }
