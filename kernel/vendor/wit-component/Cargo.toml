# Vendored + de-std'd copy of wit-component 0.250.0 for the bare-metal kernel's
# on-target component algebra (plan/12 Decisions 26-34). Kernel-workspace-only via
# [patch.crates-io]; the host and guest workspaces keep the registry crate.
#
# Changes vs the registry crate (all no_std plumbing + dependency hygiene, no encoder
# logic changes): `#![no_std]` + alloc; std collections -> hashbrown/alloc aliases;
# `wasm-metadata` (flate2/url/icu/spdx, not no_std) made optional behind an off-by-default
# `metadata` feature, with the informational `producers` custom section dropped when off;
# the unused `serde`/`serde_derive`/`serde_json` deps removed (no source references them);
# deps set `default-features = false` with a forwarding `std` feature; `wat`/`wast` kept
# optional and off. See kernel/vendor/README.md.

[package]
edition = "2024"
rust-version = "1.85.0"
name = "wit-component"
version = "0.250.0"
authors = ["Peter Huene <peter@huene.dev>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Tooling for working with `*.wit` and component files together."
homepage = "https://github.com/bytecodealliance/wasm-tools/tree/main/crates/wit-component"
documentation = "https://docs.rs/wit-component"
readme = "README.md"
license = "Apache-2.0 WITH LLVM-exception OR Apache-2.0 OR MIT"
repository = "https://github.com/bytecodealliance/wasm-tools/tree/main/crates/wit-component"

[features]
default = ["std"]
std = [
    "anyhow/std",
    "wasmparser/std",
    "wasm-encoder/std",
    "wit-parser/std",
    "indexmap/std",
]
# The producers/metadata custom-section merge path; pulls wasm-metadata
# (flate2/url/icu/spdx), which is not no_std. Off by default — the kernel does not need a
# producers section, and it is informational (non-semantic) so omitting it keeps the
# encoded component valid.
metadata = ["dep:wasm-metadata"]
# The package-metadata custom section in `wit_component::encode` uses wit-parser's serde
# path (serde_json, std-only). Off by default — eo9-component does not use that encoder.
wit-package-metadata = ["wit-parser/serde"]
dummy-module = ["dep:wat"]
semver-check = ["dummy-module"]
wat = [
    "dep:wast",
    "dep:wat",
]

[lib]
name = "wit_component"
path = "src/lib.rs"

[dependencies.anyhow]
version = "1.0.100"
default-features = false

[dependencies.bitflags]
version = "2.3.3"
default-features = false

[dependencies.hashbrown]
version = "0.17.0"
features = ["default-hasher"]
default-features = false

[dependencies.indexmap]
version = "2.14.0"
default-features = false

[dependencies.log]
version = "0.4.17"
default-features = false

[dependencies.wasm-encoder]
version = "0.250.0"
features = [
    "component-model",
    "wasmparser",
]
default-features = false

[dependencies.wasm-metadata]
version = "0.250.0"
optional = true
default-features = false

[dependencies.wasmparser]
version = "0.250.0"
features = [
    "validate",
    "features",
    "component-model",
    "simd",
    "hash-collections",
]
default-features = false

[dependencies.wast]
version = "250.0.0"
optional = true
default-features = false

[dependencies.wat]
version = "1.250.0"
optional = true
default-features = false

[dependencies.wit-parser]
version = "0.250.0"
features = ["decoding"]
default-features = false
