[package]
name = "eo9-stub-fs-memfs"
description = "Eo9 standard stub provider `fs.memfs`: exports eo9:fs/fs backed by a RAM filesystem (the deterministic scratch/test fs)."
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
# A core wasm module that `cargo xtask build-guest` turns into a component.
crate-type = ["cdylib"]

[dependencies]
eo9-guest = { workspace = true }
wit-bindgen = { workspace = true }
