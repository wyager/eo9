[package]
name = "eo9-stub-disk-none"
description = "Eo9 standard stub provider `disk.none`: exports eo9:disk/disk-optional with default() answering none (absence of the disk capability)."
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
# A core wasm module that `cargo xtask build-guest` turns into a component.
crate-type = ["cdylib"]

[dependencies]
eo9-guest = { workspace = true }
wit-bindgen = { workspace = true }
