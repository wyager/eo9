# Target-specific build flags for the bare-metal kernel workspace.
#
# x86_64-unknown-none defaults to position-independent code (it is meant to be loadable
# anywhere); the Eo9 kernel is linked at a fixed physical address by linker-x86_64.ld and
# boots through QEMU's PVH loader, so it is built with the static relocation model instead —
# the same model the aarch64 and riscv64 bare-metal targets already use by default. Without
# this the 32-bit boot stub's absolute references (the boot GDT, the boot page tables, the
# stack top) are rejected by the linker as "cannot be used against local symbol".
[target.x86_64-unknown-none]
rustflags = ["-C", "relocation-model=static"]
